<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>এক্সেল ডুপ্লিকেট রিমুভার</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="file"] {
            margin: 20px 0;
            padding: 10px;
            border: 1px dashed #ccc;
            width: 100%;
            cursor: pointer;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #218838; }
        #status { margin-top: 15px; color: #555; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>এক্সেল ডুপ্লিকেট চেকার</h2>
    <p>আপনার এক্সেল ফাইলটি আপলোড করুন</p>
    <input type="file" id="excelFile" accept=".xlsx, .xls" />
    <br>
    <button onclick="processExcel()">ডুপ্লিকেট রিমুভ করুন</button>
    <p id="status"></p>
</div>

<script>
    function processExcel() {
        const fileInput = document.getElementById('excelFile');
        const status = document.getElementById('status');

        if (fileInput.files.length === 0) {
            alert("অনুগ্রহ করে একটি ফাইল সিলেক্ট করুন!");
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        status.innerText = "প্রসেসিং হচ্ছে...";

        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });

            // প্রথম শীটটি নিচ্ছি
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];

            // ডাটাকে JSON এ কনভার্ট করছি
            const jsonData = XLSX.utils.sheet_to_json(worksheet);

            if (jsonData.length === 0) {
                status.innerText = "ফাইলে কোন ডাটা পাওয়া যায়নি!";
                return;
            }

            // ডুপ্লিকেট রিমুভ করার লজিক
            // JSON অবজেক্টগুলোকে স্ট্রিং হিসেবে তুলনা করে ইউনিক ডাটা বের করা হচ্ছে
            const uniqueData = jsonData.filter((value, index, self) =>
                index === self.findIndex((t) => (
                    JSON.stringify(t) === JSON.stringify(value)
                ))
            );

            const duplicateCount = jsonData.length - uniqueData.length;

            // নতুন এক্সেল ফাইল তৈরি
            const newSheet = XLSX.utils.json_to_sheet(uniqueData);
            const newWorkbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(newWorkbook, newSheet, "CleanedData");

            // ডাউনলোড করানো
            XLSX.writeFile(newWorkbook, "Cleaned_File.xlsx");

            status.innerText = `সফলভাবে সম্পন্ন হয়েছে! মোট ${duplicateCount}টি ডুপ্লিকেট রিমুভ করা হয়েছে।`;
        };

        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
