<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Cleaner Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        input[type="file"] { margin: 20px 0; width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
        .btn { background-color: #1a73e8; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .download-btn { background-color: #28a745; display: none; text-decoration: none; color: white; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; box-sizing: border-box; display: inline-block; margin-top: 10px; border: none; }
        #status { margin-top: 15px; font-size: 14px; color: #555; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>Excel Duplicate Remover</h2>
    <p style="color: #666; font-size: 14px;">ফাইল আপলোড করে ডুপ্লিকেট রিমুভ করুন</p>
    
    <input type="file" id="fileInput" accept=".xlsx, .xls">
    
    <button id="processBtn" class="btn" onclick="processExcel()">১. ডুপ্লিকেট চেক করুন</button>
    
    <button id="downloadBtn" class="download-btn" style="display: none;" onclick="downloadCleanedFile()">২. ফাইলটি ডাউনলোড করুন</button>
    
    <div id="status"></div>
</div>

<script>
    let cleanedWorkbook = null;

    function processExcel() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        const processBtn = document.getElementById('processBtn');

        if (!fileInput.files[0]) {
            status.innerHTML = "<span style='color:red;'>অনুগ্রহ করে একটি ফাইল সিলেক্ট করুন!</span>";
            return;
        }

        const reader = new FileReader();
        status.innerText = "প্রসেসিং হচ্ছে, দয়া করে অপেক্ষা করুন...";
        processBtn.disabled = true;

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);

                if (jsonData.length === 0) {
                    status.innerText = "ফাইলটি খালি!";
                    processBtn.disabled = false;
                    return;
                }

                // ডুপ্লিকেট রিমুভ করার লজিক
                const uniqueData = Array.from(new Set(jsonData.map(JSON.stringify))).map(JSON.parse);
                const removedCount = jsonData.length - uniqueData.length;

                // নতুন ডাটা দিয়ে ওয়ার্কবুক তৈরি
                const newWorksheet = XLSX.utils.json_to_sheet(uniqueData);
                cleanedWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(cleanedWorkbook, newWorksheet, "CleanedData");

                // স্ট্যাটাস আপডেট এবং ডাউনলোড বাটন দেখানো
                status.innerHTML = `<span style='color:green;'>কাজ শেষ! <br> মোট <b>${removedCount}</b>টি ডুপ্লিকেট রিমুভ করা হয়েছে।</span>`;
                downloadBtn.style.display = "block";
                processBtn.style.display = "none";

            } catch (error) {
                status.innerHTML = "<span style='color:red;'>এরর: ফাইলটি পড়া যাচ্ছে না।</span>";
                processBtn.disabled = false;
            }
        };

        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    function downloadCleanedFile() {
        if (cleanedWorkbook) {
            // ফাইল সেভ করা
            XLSX.writeFile(cleanedWorkbook, "Cleaned_Excel_File.xlsx");
        } else {
            alert("ডাউনলোড করার মতো কোনো ডাটা নেই!");
        }
    }
</script>

</body>
</html>
