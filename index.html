<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Duplicate Remover</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="file"] { margin: 20px 0; border: 1px dashed #bbb; padding: 20px; width: 100%; box-sizing: border-box; cursor: pointer; }
        button { background-color: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #219150; }
        #status { margin-top: 15px; color: #555; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Excel Duplicate Remover</h2>
    <p>আপনার এক্সেল ফাইলটি সিলেক্ট করুন</p>
    <input type="file" id="upload" accept=".xlsx, .xls">
    <br>
    <button onclick="processExcel()">ডুপ্লিকেট রিমুভ ও ডাউনলোড করুন</button>
    <div id="status"></div>
</div>

<script>
    function processExcel() {
        const fileInput = document.getElementById('upload');
        const status = document.getElementById('status');

        if (fileInput.files.length === 0) {
            alert("অনুগ্রহ করে একটি এক্সেল ফাইল সিলেক্ট করুন!");
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        status.innerText = "প্রসেসিং হচ্ছে...";

        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });

            // প্রথম শিটটি নেওয়া হচ্ছে
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];

            // ডাটাকে JSON ফরম্যাটে কনভার্ট করা
            let jsonData = XLSX.utils.sheet_to_json(worksheet);

            if (jsonData.length === 0) {
                status.innerText = "ফাইলটি খালি!";
                return;
            }

            // ডুপ্লিকেট রিমুভ করার লজিক (সম্পূর্ণ রো চেক করবে)
            const uniqueData = Array.from(new Set(jsonData.map(JSON.stringify))).map(JSON.parse);

            const removedCount = jsonData.length - uniqueData.length;

            // নতুন ওয়ার্কবুক তৈরি
            const newWorksheet = XLSX.utils.json_to_sheet(uniqueData);
            const newWorkbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "CleanedData");

            // ফাইল ডাউনলোড
            XLSX.writeFile(newWorkbook, "Cleaned_File.xlsx");

            status.innerText = `সফল হয়েছে! ${removedCount}টি ডুপ্লিকেট রিমুভ করা হয়েছে।`;
        };

        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
