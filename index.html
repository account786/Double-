<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Cleaner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h3 { color: #2c3e50; }
        input[type="file"] { margin: 20px 0; font-size: 14px; width: 100%; }
        .btn { background-color: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background-color: #2980b9; }
        #msg { margin-top: 15px; font-size: 14px; color: #e67e22; }
    </style>
</head>
<body>

<div class="card">
    <h3>Excel Duplicate Remover</h3>
    <p style="font-size: 13px; color: #7f8c8d;">এক্সেল ফাইল থেকে ডুপ্লিকেট ডাটা রিমুভ করুন</p>
    
    <input type="file" id="fileInput" accept=".xlsx, .xls">
    <button class="btn" onclick="processFile()">ফাইল ক্লিন করুন</button>
    
    <div id="msg"></div>
</div>

<script>
    function processFile() {
        const input = document.getElementById('fileInput');
        const msg = document.getElementById('msg');

        if (!input.files[0]) {
            msg.innerText = "দয়া করে আগে একটি ফাইল সিলেক্ট করুন।";
            return;
        }

        msg.innerText = "প্রসেসিং চলছে...";

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const json = XLSX.utils.sheet_to_json(worksheet);

                if (json.length === 0) {
                    msg.innerText = "ফাইলটি খালি!";
                    return;
                }

                // ডুপ্লিকেট রিমুভ করার উন্নত লজিক
                const unique = Array.from(new Set(json.map(JSON.stringify))).map(JSON.parse);
                const removed = json.length - unique.length;

                const newSheet = XLSX.utils.json_to_sheet(unique);
                const newWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(newWorkbook, newSheet, "Cleaned");

                // মোবাইল ব্রাউজারের জন্য সেভ করার পদ্ধতি
                XLSX.writeFile(newWorkbook, "Cleaned_Data.xlsx");

                msg.style.color = "#27ae60";
                msg.innerText = `সফল! ${removed}টি ডুপ্লিকেট বাদ দেওয়া হয়েছে।`;
            } catch (err) {
                msg.style.color = "#c0392b";
                msg.innerText = "এরর: ফাইলটি প্রসেস করা যাচ্ছে না।";
                console.error(err);
            }
        };

        reader.readAsArrayBuffer(input.files[0]);
    }
</script>

</body>
</html>
