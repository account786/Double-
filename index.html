<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Cleaner Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--tg-theme-secondary-bg-color, #f0f0f0); padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--tg-theme-button-color, #2481cc); margin-bottom: 15px; }
        input[type="file"] { margin: 20px 0; width: 100%; color: var(--tg-theme-text-color); }
        .btn { background-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #ffffff); border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        #downloadBtn { background-color: #31b545; margin-top: 10px; display: none; text-decoration: none; display: none; align-items: center; justify-content: center; }
        #status { margin-top: 15px; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <h2>Excel Cleaner</h2>
    <p>Duplicate রিমুভ করে অরিজিনাল ফাইল ডাউনলোড করুন</p>
    
    <input type="file" id="fileInput" accept=".xlsx, .xls">
    
    <button id="processBtn" class="btn" onclick="processExcel()">ফাইল চেক করুন</button>
    <a id="downloadBtn" class="btn">ফাইলটি সেভ করুন</a>
    
    <div id="status"></div>
</div>

<script>
    // Telegram WebApp Initialize
    const tg = window.Telegram.WebApp;
    tg.expand(); // অ্যাপটি বড় করে ওপেন হবে

    function processExcel() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        const processBtn = document.getElementById('processBtn');

        if (!fileInput.files[0]) {
            tg.showAlert("অনুগ্রহ করে একটি এক্সেল ফাইল সিলেক্ট করুন!");
            return;
        }

        const reader = new FileReader();
        status.innerText = "প্রসেসিং চলছে...";

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);

                if (jsonData.length === 0) {
                    status.innerText = "ফাইলটি খালি!";
                    return;
                }

                // ডুপ্লিকেট রিমুভ (একদম হুবহু রো গুলো বাদ যাবে)
                const uniqueData = Array.from(new Set(jsonData.map(JSON.stringify))).map(JSON.parse);
                const removedCount = jsonData.length - uniqueData.length;

                const newWorksheet = XLSX.utils.json_to_sheet(uniqueData);
                const newWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "Cleaned");

                // এক্সেল ডাটাকে Base64 এ কনভার্ট করা (টেলিগ্রামের জন্য ভালো কাজ করে)
                const excelBin = XLSX.write(newWorkbook, { bookType: 'xlsx', type: 'binary' });
                const buffer = new ArrayBuffer(excelBin.length);
                const view = new Uint8Array(buffer);
                for (let i = 0; i < excelBin.length; i++) view[i] = excelBin.charCodeAt(i) & 0xFF;
                
                const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                const url = URL.createObjectURL(blob);

                // ডাউনলোড বাটন সেটআপ
                downloadBtn.href = url;
                downloadBtn.download = "Cleaned_Data.xlsx";
                downloadBtn.style.display = "flex";
                processBtn.style.display = "none";

                status.innerHTML = `<b style="color:#31b545;">সফল!</b> ${removedCount}টি ডুপ্লিকেট রিমুভ করা হয়েছে।`;
                
                tg.HapticFeedback.notificationOccurred('success');
            } catch (err) {
                status.innerText = "ভুল ফাইল ফরম্যাট!";
                console.error(err);
            }
        };

        reader.readAsArrayBuffer(fileInput.files[0]);
    }
</script>

</body>
</html>
